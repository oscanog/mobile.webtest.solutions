server {
    listen 80;
    listen [::]:80;
    server_name m.webtest.online;

    return 301 https://m.webtest.solutions$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name mobile.webtest.online;

    return 301 https://mobile.webtest.solutions$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name m.webtest.online;

    ssl_certificate /etc/letsencrypt/live/webtest-mobileweb/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/webtest-mobileweb/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://m.webtest.solutions$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name mobile.webtest.online;

    ssl_certificate /etc/letsencrypt/live/webtest-mobileweb/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/webtest-mobileweb/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://mobile.webtest.solutions$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name m.webtest.solutions mobile.webtest.solutions;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name m.webtest.solutions mobile.webtest.solutions;

    client_max_body_size 25m;

    root /var/www/webtest-mobileweb/dist;
    index index.html;

    location ^~ /api/v1/ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/webtest/api/v1/index.php;
        fastcgi_param SCRIPT_NAME /api/v1/index.php;
        fastcgi_param PATH_INFO "";
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
    }

    location /ws/notifications {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://127.0.0.1:8090;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }

    ssl_certificate /etc/letsencrypt/live/webtest-mobileweb/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/webtest-mobileweb/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
