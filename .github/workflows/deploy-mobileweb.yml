name: Deploy Mobile Web

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Create release bundle
        shell: bash
        run: |
          set -euo pipefail
          tar -czf bugcatcher-mobileweb-release.tar.gz \
            dist \
            infra/nginx/bugcatcher-mobileweb.conf \
            scripts/deploy-mobileweb.sh

      - name: Upload release bundle
        shell: bash
        run: |
          set -euo pipefail
          scp -i ~/.ssh/id_ed25519 bugcatcher-mobileweb-release.tar.gz \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/bugcatcher-mobileweb-release.tar.gz"

      - name: Deploy on VM
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<'EOF'
          set -euo pipefail
          RELEASE_DIR=/tmp/bugcatcher-mobileweb-release
          rm -rf "$RELEASE_DIR"
          mkdir -p "$RELEASE_DIR"
          tar -xzf /tmp/bugcatcher-mobileweb-release.tar.gz -C "$RELEASE_DIR"
          bash "$RELEASE_DIR/scripts/deploy-mobileweb.sh" "$RELEASE_DIR"
          rm -rf "$RELEASE_DIR" /tmp/bugcatcher-mobileweb-release.tar.gz
          EOF
