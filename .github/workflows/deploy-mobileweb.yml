name: Deploy Mobile Web

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Deploy on VM
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<'EOF'
          set -euo pipefail
          REPO_DIR=/var/www/mobile.webtest.solutions
          REPO_URL=https://github.com/oscanog/mobile.webtest.solutions.git
          BRANCH=main
          if [ ! -d "$REPO_DIR/.git" ]; then
            sudo mkdir -p "$(dirname "$REPO_DIR")"
            sudo git clone --branch "$BRANCH" "$REPO_URL" "$REPO_DIR"
            sudo chown -R "$USER:$USER" "$REPO_DIR"
          fi
          export REPO_DIR REPO_URL BRANCH
          bash "$REPO_DIR/scripts/deploy-mobileweb.sh"
          EOF
